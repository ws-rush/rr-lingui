# CI verification for the lingui-rr library.
#
# Runs validation checks on every push to main and on every pull request,
# including linting, format checks, fallow audits, typechecking, unit testing,
# compiling the library, and running the integration E2E Playwright tests.
name: verify

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs for the same ref when a new commit is pushed.
concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lingui-rr-lint:
    name: lingui-rr lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - run: pnpm lint

  lingui-rr-format:
    name: lingui-rr format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - run: pnpm format:check

  lingui-rr-fallow:
    name: lingui-rr fallow audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-pnpm
      - name: Ensure git is available
        run: |
          if ! command -v git >/dev/null 2>&1; then
            if command -v sudo >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y git
            else
              apt-get update
              apt-get install -y git
            fi
          fi
      - name: Run fallow audit
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BASE_SHA: ${{ github.event.before }}
        run: |
          if [ -n "$PR_BASE_SHA" ]; then
            BASE="$PR_BASE_SHA"
          elif [ -n "$PUSH_BASE_SHA" ] && [ "$PUSH_BASE_SHA" != "0000000000000000000000000000000000000000" ]; then
            BASE="$PUSH_BASE_SHA"
          else
            BASE="origin/main"
          fi
          pnpm exec fallow audit --base "$BASE"

  lingui-rr-typecheck:
    name: lingui-rr typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - run: pnpm typecheck

  lingui-rr-test:
    name: lingui-rr test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - run: pnpm test

  lingui-rr-build:
    name: lingui-rr build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - run: pnpm build

  lingui-rr-e2e:
    name: lingui-rr E2E tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('e2e/package.json') }}
      - name: Install Playwright browsers (if not cached)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @lingui-rr/e2e install-browsers
      - name: Run E2E Tests
        run: pnpm test:e2e
